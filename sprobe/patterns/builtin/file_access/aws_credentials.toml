id = "aws_credentials_read"
category = "file_access"
severity = "critical"
description = "Package attempts to read AWS credential files"
tags = ["credential_theft", "aws"]
expected_for = ["boto3", "botocore", "awscli", "s3fs", "aiobotocore", "moto"]

[detection]
type = "regex"
target = "source"

[[detection.rules]]
pattern = '\.aws/credentials'

[[detection.rules]]
pattern = '\.aws/config'

[[detection.rules]]
pattern = 'os\.(environ|getenv).*AWS_SECRET_ACCESS_KEY'

[[detection.rules]]
pattern = 'os\.(environ|getenv).*AWS_ACCESS_KEY_ID'

[[detection.rules]]
pattern = 'os\.(environ|getenv).*AWS_SESSION_TOKEN'
