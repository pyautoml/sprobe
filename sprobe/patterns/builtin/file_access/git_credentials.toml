id = "git_credentials_read"
category = "file_access"
severity = "critical"
description = "Package attempts to read Git credential storage"
tags = ["credential_theft", "git"]
expected_for = ["gitpython", "pygit2", "dulwich", "gh", "hub"]

[detection]
type = "regex"
target = "source"

[[detection.rules]]
pattern = '\.git-credentials'

[[detection.rules]]
pattern = 'git/credentials'

[[detection.rules]]
pattern = 'os\.(environ|getenv).*GITHUB_TOKEN'

[[detection.rules]]
pattern = 'os\.(environ|getenv).*GIT_TOKEN'
